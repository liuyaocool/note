# ------ 有一些不是窗口 而是layer(图层 不继承普通窗口的blur 需要单独设置)
layerrule = blur on, match:namespace waybar

# ------ 全局命令的wiki在Dispatchers中
bindm=$MOD,mouse:272,movewindow
bindm=$MOD,mouse:273,resizewindow

# screen shot
bind=$MOD,a,exec,grim -g "$(slurp)" - | swappy -f -
bind=$MOD SHIFT,a,exec,grim -g "$(slurp)"  - | wl-copy

# keycode(36,61...) get by wev
$rofi=rofi -theme ~/.config/rofi/themes/launcher06-07.rasi -show
bind=$MOD,p,exec,$rofi drun
bind=$MOD,o,exec,$rofi window
bind=$MOD,61,exec,$rofi run -matching prefix -filter "q-" -disable-history

bind=$MOD SHIFT,36,exec,foot /bin/zsh
bind=$MOD SHIFT,c,killactive
bind=$MOD,c,centerwindow
bind=$MOD,f,togglefloating
bind=$MOD,g,execr, hyprctl dispatch togglefloating && hyprctl dispatch pin && hyprctl dispatch centerwindow
bind=$MOD SHIFT,r, exec, hyprctl reload

# ------ layoutmsg命令的wiki在Master Layout布局中
bind=$MOD,59,layoutmsg,addmaster
bind=$MOD,60,layoutmsg,removemaster
bind=$MOD,47,layoutmsg,swapprev
bind=$MOD,48,layoutmsg,swapnext
bind=$MOD,i,layoutmsg,cycleprev
bind=$MOD,k,layoutmsg,cyclenext
bind=$MOD,j,focusmonitor,l
bind=$MOD,l,focusmonitor,r
bind=$MOD SHIFT,j,movewindow, mon:l
bind=$MOD SHIFT,l,movewindow, mon:r
bind=$MOD,36,layoutmsg,swapwithmaster master
bind=$MOD,34,resizeactive,-20 0
bind=$MOD,35,resizeactive,20 0
bind=$MOD,Tab,focuscurrentorlast

$workspace=exec,~/bin/hypr-ext workspace
bind=$MOD,20,workspace,-1
bind=$MOD,21,workspace,+1
# bind=$MOD SHIFT,20,split-movetoworkspacesilent,-1
# bind=$MOD SHIFT,21,split-movetoworkspacesilent,+1
bind=$MOD SHIFT,20,movetoworkspacesilent, -1
bind=$MOD SHIFT,21,movetoworkspacesilent, +1
bind=$MOD,1,$workspace 1
bind=$MOD,2,$workspace 2
bind=$MOD,3,$workspace 3
bind=$MOD,4,$workspace 4
bind=$MOD,5,$workspace 5
bind=$MOD,6,$workspace 6
bind=$MOD,7,$workspace 7
bind=$MOD,8,$workspace 8
bind=$MOD,9,$workspace 9
bind=$MOD,0,$workspace 10
$move=exec,~/bin/hypr-ext movetoworkspacesilent
bind=$MOD SHIFT,1,$move 1
bind=$MOD SHIFT,2,$move 2
bind=$MOD SHIFT,3,$move 3
bind=$MOD SHIFT,4,$move 4
bind=$MOD SHIFT,5,$move 5
bind=$MOD SHIFT,6,$move 6
bind=$MOD SHIFT,7,$move 7
bind=$MOD SHIFT,8,$move 8
bind=$MOD SHIFT,9,$move 9
bind=$MOD SHIFT,0,$move 10

# https://wiki.hyprland.org/Configuring/Variables/#sections
master {
    new_on_top = true
#	new_status = master
}

input {
    follow_mouse=1
#	mouse_refocus=false
#	float_switch_override_focus = 2
    touchpad {
        natural_scroll=true
    }
    natural_scroll=true
    # kb_options=caps:swapescape
}

general {
    border_size=2
    gaps_in=2
    gaps_out=4
    col.active_border=0xff00ffff
    col.inactive_border=0x66333333
    layout=master
}

cursor {
	hide_on_key_press=true
	# 关闭鼠标自动移到焦点窗口
	no_warps=false
}

animations {
    enabled = true
    animation=windows,1,3,default
    animation=border,1,3,default
    animation=fade,1,3,default
    animation=workspaces,1,3,default
}

decoration {
    blur {
        enabled = true
        size = 10
        passes = 2
    }
    active_opacity=1
    inactive_opacity=1
    rounding=3
}

misc {
#	focus_on_activate = true
}
