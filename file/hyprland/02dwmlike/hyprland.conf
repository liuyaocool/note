# exec-once=nginx
exec-once=fcitx5 -d --replace
# exec-once=~/bin/hypr-xdg
exec-once=waybar
# exec-once=swww-daemon
# exec-once=~/bin/wayland/hypr_ipc
# exec-once=autossh -M 4000 -NR 8822:127.0.0.1:22 root@autossh.liuyao.link -p 27085
# exec-once=~/bin/p-client q2
# exec-once=~/bin/gitproxy
exec-once=swww-daemon
# exec-once=~/bin/swww img ~/Pictures/wallpaper/coding.jpg
exec-once = hyprpm reload -n

$MOD=SUPER

# hyprctl monitors
monitor = DP-1, 2560x1440@100, 1920x-700, 1
monitor = HDMI-A-2, 1920x1080@60, 0x0, 1

# #  hyprctl clients | grep "Open File"
